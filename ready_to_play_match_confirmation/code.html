<style>

<!-- Simple JS to generate high-energy confetti -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#FF8A70', '#ff5a36', '#00B4A2', '#70f8e4', '#7d8ce4'];
            const shapes = ['rounded-full', 'rounded-sm'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                const color = colors[Math.floor(Math.random() * colors.length)];
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                // Random properties
                const left = Math.random() * 100;
                const animDuration = Math.random() * 3 + 2;
                const animDelay = Math.random() * 2;
                const width = Math.random() * 10 + 5;
                const height = shape === 'rounded-full' ? width : Math.random() * 15 + 5;
                
                confetti.className = `confetti-piece ${shape}`;
                confetti.style.left = `${left}vw`;
                confetti.style.width = `${width}px`;
                confetti.style.height = `${height}px`;
                confetti.style.backgroundColor = color;
                confetti.style.animationDuration = `${animDuration}s`;
                confetti.style.animationDelay = `${animDelay}s`;
                
                container.appendChild(confetti);
            }
        });
    </script>
