<style>
        .clay-button {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 8px 16px rgba(255, 90, 54, 0.3);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }
        .clay-button:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 2px 4px rgba(255, 90, 54, 0.3);
        }
        
        .sport-card {
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateZ(0);
        }
        .sport-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 50px rgba(0,0,0,0.1);
        }
        .sport-card.selected {
            border-color: theme('colors.primary-container');
            background-color: theme('colors.surface-container-low');
            box-shadow: 0 0 0 4px theme('colors.primary-container'), 0 30px 50px rgba(255, 90, 54, 0.2);
        }
        
        /* Subtle background animation */
        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .bg-blob {
            animation: drift 20s infinite alternate ease-in-out;
        }
    </style>

                Continue to Profile
                <span class="material-symbols-outlined">arrow_forward</span>
</button>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const sportCards = document.querySelectorAll('.sport-card');
            const continueBtn = document.getElementById('continue-btn');
            let selectedCount = 0;

            sportCards.forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('selected');
                    const isSelected = card.classList.contains('selected');
                    card.setAttribute('aria-pressed', isSelected);
                    
                    if (isSelected) {
                        selectedCount++;
                        // Simple popping animation for internal check icon
                        const checkIcon = card.querySelector('.material-symbols-outlined.text-white');
                        checkIcon.style.transform = 'scale(0.5)';
                        setTimeout(() => checkIcon.style.transform = 'scale(1)', 50);
                    } else {
                        selectedCount--;
                    }

                    updateContinueButton();
                });
            });

            function updateContinueButton() {
                if (selectedCount > 0) {
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    continueBtn.classList.add('hover:-translate-y-1', 'hover:shadow-xl');
                } else {
                    continueBtn.disabled = true;
                    continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    continueBtn.classList.remove('hover:-translate-y-1', 'hover:shadow-xl');
                }
            }
        });
    </script>
