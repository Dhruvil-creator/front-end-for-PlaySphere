<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>PlaySphere - Create Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#ffdad2",
                        "secondary": "#006b5f",
                        "on-secondary-container": "#006f64",
                        "primary-container": "#ff5a36",
                        "inverse-primary": "#ffb4a3",
                        "tertiary-fixed": "#dee0ff",
                        "tertiary": "#4858ab",
                        "on-tertiary-container": "#0d2075",
                        "on-tertiary-fixed": "#00105b",
                        "on-surface": "#271814",
                        "surface-dim": "#f0d4ce",
                        "surface-bright": "#fff8f6",
                        "on-tertiary-fixed-variant": "#2f3f92",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#5a0c00",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#7d8ce4",
                        "primary-fixed-dim": "#ffb4a3",
                        "on-surface-variant": "#434655",
                        "surface": "#fff8f6",
                        "on-error-container": "#93000a",
                        "on-background": "#271814",
                        "secondary-fixed-dim": "#4fdbc8",
                        "on-primary-fixed": "#3d0600",
                        "surface-container": "#ffe9e5",
                        "surface-container-low": "#fff0ed",
                        "surface-container-high": "#ffe2dc",
                        "clay-bg": "#F5EFE9",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#e3beb6",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#f9dcd6",
                        "surface-tint": "#b52603",
                        "error-container": "#ffdad6",
                        "background": "#fff8f6",
                        "primary-soft": "#FF8A70",
                        "secondary-fixed": "#70f8e4",
                        "secondary-container": "#6df5e1",
                        "on-primary-fixed-variant": "#8c1900",
                        "surface-card": "#FFFFFF",
                        "on-secondary-fixed": "#00201c",
                        "surface-container-highest": "#f9dcd6",
                        "inverse-on-surface": "#ffede9",
                        "tertiary-fixed-dim": "#bac3ff",
                        "on-secondary-fixed-variant": "#005048",
                        "on-error": "#ffffff",
                        "outline": "#8f7069",
                        "inverse-surface": "#3e2c28",
                        "map-teal": "#00B4A2",
                        "primary": "#b52603",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "xs": "4px",
                        "xl": "80px",
                        "md": "24px",
                        "gutter": "24px",
                        "sm": "12px",
                        "container-max": "1280px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "button": ["Nunito"],
                        "headline-sm": ["Nunito"],
                        "label-caps": ["Nunito"],
                        "headline-section": ["Nunito"],
                        "body-md": ["Nunito"],
                        "body-lg": ["Nunito"],
                        "display-hero": ["Nunito"],
                        "display-hero-mobile": ["Nunito"]
                    },
                    "fontSize": {
                        "button": ["18px", { "lineHeight": "1", "fontWeight": "700" }],
                        "headline-sm": ["28px", { "lineHeight": "1.3", "fontWeight": "800" }],
                        "label-caps": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "800" }],
                        "headline-section": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "900" }],
                        "body-md": ["18px", { "lineHeight": "1.5", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "fontWeight": "600" }],
                        "display-hero": ["80px", { "lineHeight": "1.05", "letterSpacing": "-0.03em", "fontWeight": "900" }],
                        "display-hero-mobile": ["56px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "900" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Liquid Decoration Animations */
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        .liquid-blob {
            animation: morph 8s ease-in-out infinite;
            filter: blur(40px);
        }
        
        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #e3beb6; /* outline-variant */
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-clay-bg min-h-screen relative overflow-x-hidden font-body-md text-on-surface antialiased flex items-center justify-center p-4 md:p-gutter">
<!-- Ambient Liquid Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-secondary-container/40 liquid-blob mix-blend-multiply"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-primary-fixed/50 liquid-blob mix-blend-multiply" style="animation-delay: -4s;"></div>
<div class="absolute top-[30%] right-[10%] w-[30vw] h-[30vw] bg-surface-variant/60 liquid-blob mix-blend-multiply" style="animation-duration: 12s;"></div>
</div>
<!-- Main Creation Modal/Card (Task-Focused: No Main Nav) -->
<main class="relative z-10 w-full max-w-3xl bg-surface-card rounded-xl shadow-[0_24px_48px_-12px_rgba(39,24,20,0.15)] border border-white/50 flex flex-col overflow-hidden backdrop-blur-sm">
<!-- Header -->
<header class="flex items-center justify-between p-6 border-b border-surface-variant/50">
<h1 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">edit_square</span>
                Create Post
            </h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high text-on-surface-variant transition-colors group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">close</span>
</button>
</header>
<div class="p-6 md:p-8 flex flex-col gap-8 overflow-y-auto max-h-[80vh]">
<!-- Step 1: Post Type Selection -->
<section class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant">Post Type</label>
<div class="flex flex-wrap gap-3 bg-surface-container-low p-2 rounded-full border border-surface-variant">
<button class="flex-1 py-3 px-4 rounded-full font-button text-button text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-all">
                        Standard
                    </button>
<!-- Active State: Need Players -->
<button class="flex-1 py-3 px-4 rounded-full font-button text-button bg-secondary text-on-secondary shadow-md transition-all transform scale-[1.02]">
                        Need Players
                    </button>
<button class="flex-1 py-3 px-4 rounded-full font-button text-button text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-all">
                        Match Result
                    </button>
</div>
</section>
<!-- Step 2: Need Players Form (Bento Grid) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in-up">
<!-- Venue Search -->
<div class="col-span-1 md:col-span-2 bg-surface-container-lowest rounded-lg p-4 border border-outline-variant shadow-sm focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-all">
<label class="block font-label-caps text-label-caps text-secondary mb-2 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">location_on</span> Venue
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-transparent border-none text-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0" placeholder="Search Ahmedabad Turfs (e.g., Sindhu Bhavan Box)" type="text">
</div>
</div>
<!-- Sport & Skill Level -->
<div class="flex flex-col gap-4">
<div class="bg-surface-container-lowest rounded-lg p-4 border border-outline-variant shadow-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-3">Sport</label>
<div class="flex gap-2">
<button class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface font-button text-sm border border-transparent hover:border-outline-variant transition-colors">Cricket</button>
<button class="px-4 py-2 rounded-full bg-primary-fixed text-primary-container font-button text-sm border border-primary-container shadow-sm transition-colors">Football</button>
<button class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface font-button text-sm border border-transparent hover:border-outline-variant transition-colors">Padel</button>
</div>
</div>
</div>
<!-- Date & Skill -->
<div class="flex flex-col gap-4">
<div class="bg-surface-container-lowest rounded-lg p-4 border border-outline-variant shadow-sm flex flex-col justify-center">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Skill Level Needed</label>
<div class="flex justify-between items-center bg-surface-container-low rounded-full p-1 relative">
<!-- Simulated slider thumb -->
<div class="absolute left-[33%] w-[33%] h-[80%] top-[10%] bg-white rounded-full shadow-sm border border-outline-variant/30 z-0"></div>
<button class="relative z-10 flex-1 text-center py-2 text-sm font-button text-on-surface-variant">Beginner</button>
<button class="relative z-10 flex-1 text-center py-2 text-sm font-button text-on-surface">Inter</button>
<button class="relative z-10 flex-1 text-center py-2 text-sm font-button text-on-surface-variant">Pro</button>
</div>
</div>
</div>
</section>
<!-- Step 3: Caption -->
<section>
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-sm overflow-hidden focus-within:border-primary-container focus-within:ring-1 focus-within:ring-primary-container transition-all">
<textarea class="w-full p-4 bg-transparent border-none text-body-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0 resize-none" placeholder="Add a caption... Describe the vibe, specific rules, or just say hi!" rows="3"></textarea>
<!-- Rich Text Toolbar (Simulated) -->
<div class="bg-surface-container-low px-4 py-2 border-t border-surface-variant flex items-center gap-2">
<button class="p-1 rounded text-on-surface-variant hover:bg-surface-variant transition-colors"><span class="material-symbols-outlined text-[20px]">format_bold</span></button>
<button class="p-1 rounded text-on-surface-variant hover:bg-surface-variant transition-colors"><span class="material-symbols-outlined text-[20px]">format_italic</span></button>
<div class="w-[1px] h-4 bg-outline-variant mx-1"></div>
<button class="p-1 rounded text-on-surface-variant hover:bg-surface-variant transition-colors"><span class="material-symbols-outlined text-[20px]">mood</span></button>
<button class="p-1 rounded text-on-surface-variant hover:bg-surface-variant transition-colors"><span class="material-symbols-outlined text-[20px]">alternate_email</span></button>
</div>
</div>
</section>
<!-- Step 4: Media Upload -->
<section>
<div class="group relative w-full rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-low hover:bg-surface-variant hover:border-secondary transition-all cursor-pointer p-8 flex flex-col items-center justify-center text-center">
<div class="w-16 h-16 rounded-full bg-surface-card shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-secondary text-[32px]">add_photo_alternate</span>
</div>
<p class="font-body-md text-body-md text-on-surface mb-1">Drag and drop media here</p>
<p class="text-sm text-on-surface-variant">or <span class="text-secondary font-bold hover:underline">browse files</span> (JPG, PNG, MP4 up to 50MB)</p>
</div>
</section>
</div>
<!-- Footer Actions -->
<footer class="p-6 border-t border-surface-variant/50 bg-surface-bright flex justify-end gap-4 items-center">
<button class="px-6 py-3 font-button text-button text-on-surface-variant hover:text-on-surface transition-colors">
                Save Draft
            </button>
<!-- Clay Button Primary -->
<button class="px-8 py-3 rounded-full bg-primary-container text-on-primary font-button text-button shadow-[0_8px_16px_rgba(255,90,54,0.25),inset_0_2px_0_rgba(255,255,255,0.3)] hover:-translate-y-0.5 hover:shadow-[0_12px_24px_rgba(255,90,54,0.35),inset_0_2px_0_rgba(255,255,255,0.4)] transition-all active:translate-y-0 active:shadow-[0_4px_8px_rgba(255,90,54,0.2),inset_0_1px_0_rgba(255,255,255,0.2)] flex items-center gap-2">
                Post to Feed
                <span class="material-symbols-outlined text-[20px]">send</span>
</button>
</footer>
</main>
</body></html>
