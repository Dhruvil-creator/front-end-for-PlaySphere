<!DOCTYPE html><html lang="en"><head>

<style>
        .clay-button {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 8px 16px rgba(255, 90, 54, 0.3);
            transition: all 0.3s ease;
        }
        .clay-button:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5), 0 12px 24px rgba(255, 90, 54, 0.4);
        }
        .clay-button:active {
            transform: translateY(1px);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3), 0 4px 8px rgba(255, 90, 54, 0.2);
        }
        
        .soft-shadow {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        
        .upload-ring {
            position: relative;
        }
        
        .upload-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px dashed #ff5a36;
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .bg-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-clay-bg text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
<!-- Ambient Background Blobs -->
<div class="bg-blob w-96 h-96 bg-primary-soft top-0 left-[-10%] animate-pulse" style="animation-duration: 8s;"></div>
<div class="bg-blob w-80 h-80 bg-secondary-fixed bottom-10 right-[-5%] animate-pulse" style="animation-duration: 12s; animation-delay: 2s;"></div>
<main class="flex-grow flex flex-col items-center justify-center p-gutter max-w-container-max mx-auto w-full z-10 py-xl relative">
<!-- Back Button - Contextual -->
<div class="absolute top-md left-gutter">
<button class="w-12 h-12 bg-white rounded-full soft-shadow flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors hover:scale-105 active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="max-w-md w-full bg-surface-card rounded-[3rem] soft-shadow p-xl flex flex-col items-center text-center transform transition-all duration-500 hover:-translate-y-2 relative overflow-hidden">
<h1 class="font-headline-sm text-headline-sm text-primary-container mb-2">Add your game face</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-[280px]">Help your local PlaySphere community recognize you on the court.</p>
<!-- Upload Area -->
<div class="relative mb-xl group cursor-pointer upload-ring">
<div class="w-48 h-48 rounded-full bg-surface-container flex flex-col items-center justify-center overflow-hidden soft-shadow relative z-10 transition-transform duration-300 group-hover:scale-105">
<!-- Default State (No Image) -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-primary-container opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-[64px] mb-sm" style="font-variation-settings: 'FILL' 1;">account_circle</span>
<span class="font-button text-button">Tap to add</span>
</div>
<!-- Input overlay for semantic correctness -->
<input accept="image/*" aria-label="Upload profile picture" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" type="file">
</div>
<!-- Floating Action Badge -->
<div class="absolute bottom-2 right-2 w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white soft-shadow z-20 pointer-events-none clay-button">
<span class="material-symbols-outlined text-[24px]">add_a_photo</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-md">
<button class="w-full h-14 bg-primary-container text-white rounded-full font-button text-button clay-button flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">photo_camera</span>
                    Take a photo
                </button>
<button class="w-full h-14 bg-white text-on-surface rounded-full font-button text-button soft-shadow flex items-center justify-center gap-sm hover:scale-[1.02] transition-transform active:scale-95">
<span class="material-symbols-outlined">upload_file</span>
                    Choose from library
                </button>
</div>
<button class="mt-lg text-on-surface-variant font-body-md text-body-md underline hover:text-primary transition-colors bg-transparent border-none">
                Skip for now
            </button>
</div>
</main>
</body></html>
