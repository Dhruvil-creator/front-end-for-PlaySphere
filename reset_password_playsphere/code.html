<h1 class="font-headline-sm text-headline-sm text-on-surface mb-sm">Lost your ball?</h1>

        </p>

<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-on-surface-variant">

</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface rounded-DEFAULT py-sm pl-[40px] pr-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm font-body-md text-body-md placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="Enter your email" required="" type="email">
</div>
<button class="w-full bg-primary-container text-on-primary font-button text-button py-sm rounded-full clay-button mt-xs" type="submit">

            </button>
</form>
