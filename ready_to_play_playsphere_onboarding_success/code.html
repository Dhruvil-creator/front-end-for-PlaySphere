<style>
        .clay-button {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 10px 20px rgba(255, 90, 54, 0.3);

            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5), 0 15px 25px rgba(255, 90, 54, 0.4);
        }
        .clay-button:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3), 0 5px 10px rgba(255, 90, 54, 0.2);
        }

        .soft-card {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);

        }

        .soft-button {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }
        .soft-button:hover {

            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.08);
        }
        .soft-button:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.04);
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }

        .bg-clay-gradient {
            background: linear-gradient(135deg, #F5EFE9 0%, #fff8f6 50%, #ffe9e5 100%);

<script>
        // Simple entry animation for the card
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.soft-card');
            const buttons = document.querySelectorAll('button');
            
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            buttons.forEach(btn => {
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(20px)';
            });

            setTimeout(() => {
                card.style.transition = 'opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
                
                buttons.forEach((btn, index) => {
                    setTimeout(() => {
                        btn.style.transition = 'opacity 0.4s ease-out, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        btn.style.opacity = '1';
                        btn.style.transform = 'translateY(0)';
                    }, 200 + (index * 100));
                });
            }, 300);
        });
    </script>
