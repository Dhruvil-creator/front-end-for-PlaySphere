<style>
        body {
            background-color: theme('colors.clay-bg');
            overflow-x: hidden;
        }
        
        .clay-button {
            box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.4), 0 8px 20px rgba(255, 90, 54, 0.3);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .clay-button:active {
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.4), 0 2px 5px rgba(255, 90, 54, 0.3);
            transform: translateY(4px);
        }
        
        .soft-card {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 2px 0 rgba(255, 255, 255, 1);
            transition: all 0.3s ease;
        }
        
        .blob-bg {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, -50px) rotate(10deg); }
            100% { transform: translate(-20px, 20px) rotate(-5deg); }
        }
        
        /* Progress Bar Styles */
        .step-indicator {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .step-active {
            background-color: theme('colors.primary-container');
            color: theme('colors.on-primary');
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(255, 90, 54, 0.3);
        }
        
        .step-completed {
            background-color: theme('colors.secondary-container');
            color: theme('colors.on-secondary-container');
        }
        
        .step-pending {
            background-color: theme('colors.surface-variant');
            color: theme('colors.on-surface-variant');
        }
        
        .progress-line {
            transition: width 0.4s ease;
        }
        
        /* Form Element Styling */
        input:focus, textarea:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 4px theme('colors.primary-fixed');
            border-color: theme('colors.primary-container');
        }
    </style>

</button>

<script>
        // Simple script to handle visual interaction for the button (not functional flow)
        document.querySelector('.clay-button').addEventListener('click', function(e) {
            e.preventDefault();
            // In a real app, this would validate and transition to Step 2
            
            // Temporary visual feedback
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            
            setTimeout(() => {
                // Animate progress bar slightly to show intent
                document.querySelector('.progress-line').style.width = '50%';
                
                // Change step 1 to completed, step 2 to active
                const steps = document.querySelectorAll('.step-indicator');
                steps[0].classList.remove('step-active');
                steps[0].classList.add('step-completed');
                steps[0].innerHTML = '<span class="material-symbols-outlined">check</span>';
                
                steps[1].classList.remove('step-pending');
                steps[1].classList.add('step-active');
                
                // Reset button (just for demo purposes)
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 500);
            }, 800);
        });
    </script>
